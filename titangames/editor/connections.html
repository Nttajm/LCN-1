<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connections Editor — Titan Times</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700&family=Libre+Franklin:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/editor.css">
<link rel="stylesheet" href="css/connections-editor.css">
</head>
<body>

<header class="editor-header">
    <div class="editor-header-left">
        <a href="index.html" class="editor-logo">
            <img class="editor-logo-icon" src="../assets/ttt.png" alt="Titan Games Logo">
            <span class="editor-logo-text">Titan Times</span>
        </a>
        <span class="editor-badge">Editor</span>
        <svg class="editor-breadcrumb-sep" viewBox="0 0 8 14" fill="none" stroke="#999" stroke-width="1.5"><path d="M1 1l6 6-6 6"/></svg>
        <span class="editor-breadcrumb">Connections</span>
    </div>
    <div class="editor-header-right">
        <span class="editor-save-indicator" id="saveIndicator"></span>
        <button class="editor-btn editor-btn--secondary editor-btn--sm" id="btnSaveDraft">Save Draft</button>
        <button class="editor-btn editor-btn--accent editor-btn--sm" id="btnPublish">Publish</button>
    </div>
</header>

<main class="conn-editor-main">
    <div class="conn-editor-topbar">
        <div class="conn-editor-meta">
            <div class="conn-meta-field">
                <label for="releaseDate">Release Date</label>
                <input type="date" id="releaseDate">
            </div>
            <div class="conn-meta-field">
                <label for="authorName">Author</label>
                <input type="text" id="authorName" value="Joel Mulonde" placeholder="Author name">
            </div>
        </div>
        <div class="conn-editor-releases">
            <label>Existing Releases</label>
            <div class="conn-releases-scroll" id="releasesList"></div>
        </div>
    </div>

    <div class="conn-editor-body">
        <h2 class="conn-section-title">Categories</h2>
        <p class="conn-section-hint">Define 4 categories. Each category has a name and 4 words. Difficulty goes from easiest (yellow) to hardest (purple).</p>

        <div class="conn-categories-grid">
            <!-- Yellow (Easiest) -->
            <div class="conn-category-card" data-color="yellow">
                <div class="conn-category-header">
                    <span class="conn-category-dot conn-category-dot--yellow"></span>
                    <span class="conn-category-label">Yellow (Easiest)</span>
                </div>
                <div class="conn-category-field">
                    <label>Category Name</label>
                    <input type="text" class="conn-category-name" data-index="0" placeholder="e.g., Planets">
                </div>
                <div class="conn-category-words">
                    <label>Words (4 required)</label>
                    <div class="conn-words-row">
                        <input type="text" class="conn-word-input" data-index="0" data-word="0" placeholder="Word 1">
                        <input type="text" class="conn-word-input" data-index="0" data-word="1" placeholder="Word 2">
                    </div>
                    <div class="conn-words-row">
                        <input type="text" class="conn-word-input" data-index="0" data-word="2" placeholder="Word 3">
                        <input type="text" class="conn-word-input" data-index="0" data-word="3" placeholder="Word 4">
                    </div>
                </div>
            </div>

            <!-- Green -->
            <div class="conn-category-card" data-color="green">
                <div class="conn-category-header">
                    <span class="conn-category-dot conn-category-dot--green"></span>
                    <span class="conn-category-label">Green</span>
                </div>
                <div class="conn-category-field">
                    <label>Category Name</label>
                    <input type="text" class="conn-category-name" data-index="1" placeholder="e.g., Card Games">
                </div>
                <div class="conn-category-words">
                    <label>Words (4 required)</label>
                    <div class="conn-words-row">
                        <input type="text" class="conn-word-input" data-index="1" data-word="0" placeholder="Word 1">
                        <input type="text" class="conn-word-input" data-index="1" data-word="1" placeholder="Word 2">
                    </div>
                    <div class="conn-words-row">
                        <input type="text" class="conn-word-input" data-index="1" data-word="2" placeholder="Word 3">
                        <input type="text" class="conn-word-input" data-index="1" data-word="3" placeholder="Word 4">
                    </div>
                </div>
            </div>

            <!-- Blue -->
            <div class="conn-category-card" data-color="blue">
                <div class="conn-category-header">
                    <span class="conn-category-dot conn-category-dot--blue"></span>
                    <span class="conn-category-label">Blue</span>
                </div>
                <div class="conn-category-field">
                    <label>Category Name</label>
                    <input type="text" class="conn-category-name" data-index="2" placeholder="e.g., Types of Music">
                </div>
                <div class="conn-category-words">
                    <label>Words (4 required)</label>
                    <div class="conn-words-row">
                        <input type="text" class="conn-word-input" data-index="2" data-word="0" placeholder="Word 1">
                        <input type="text" class="conn-word-input" data-index="2" data-word="1" placeholder="Word 2">
                    </div>
                    <div class="conn-words-row">
                        <input type="text" class="conn-word-input" data-index="2" data-word="2" placeholder="Word 3">
                        <input type="text" class="conn-word-input" data-index="2" data-word="3" placeholder="Word 4">
                    </div>
                </div>
            </div>

            <!-- Purple (Hardest) -->
            <div class="conn-category-card" data-color="purple">
                <div class="conn-category-header">
                    <span class="conn-category-dot conn-category-dot--purple"></span>
                    <span class="conn-category-label">Purple (Hardest)</span>
                </div>
                <div class="conn-category-field">
                    <label>Category Name</label>
                    <input type="text" class="conn-category-name" data-index="3" placeholder="e.g., Parts of a Ship">
                </div>
                <div class="conn-category-words">
                    <label>Words (4 required)</label>
                    <div class="conn-words-row">
                        <input type="text" class="conn-word-input" data-index="3" data-word="0" placeholder="Word 1">
                        <input type="text" class="conn-word-input" data-index="3" data-word="1" placeholder="Word 2">
                    </div>
                    <div class="conn-words-row">
                        <input type="text" class="conn-word-input" data-index="3" data-word="2" placeholder="Word 3">
                        <input type="text" class="conn-word-input" data-index="3" data-word="3" placeholder="Word 4">
                    </div>
                </div>
            </div>
        </div>

        <div class="conn-preview-section">
            <h2 class="conn-section-title">Preview</h2>
            <div class="conn-preview-grid" id="previewGrid">
                <div class="conn-preview-word"></div>
                <div class="conn-preview-word"></div>
                <div class="conn-preview-word"></div>
                <div class="conn-preview-word"></div>
                <div class="conn-preview-word"></div>
                <div class="conn-preview-word"></div>
                <div class="conn-preview-word"></div>
                <div class="conn-preview-word"></div>
                <div class="conn-preview-word"></div>
                <div class="conn-preview-word"></div>
                <div class="conn-preview-word"></div>
                <div class="conn-preview-word"></div>
                <div class="conn-preview-word"></div>
                <div class="conn-preview-word"></div>
                <div class="conn-preview-word"></div>
                <div class="conn-preview-word"></div>
            </div>
            <button class="editor-btn editor-btn--secondary editor-btn--sm" id="btnShufflePreview">Shuffle Preview</button>
        </div>

        <div class="conn-json-section">
            <h2 class="conn-section-title">JSON Export / Import</h2>
            <textarea class="conn-json-input" id="fullJson" rows="12" placeholder='{"categories": [{"name": "...", "color": "yellow", "words": [...]}]}'></textarea>
            <div class="conn-json-actions">
                <button class="editor-btn editor-btn--secondary editor-btn--sm" id="btnExportJson">Export</button>
                <button class="editor-btn editor-btn--primary editor-btn--sm" id="btnImportJson">Import</button>
            </div>
        </div>
    </div>
</main>

<div class="conn-toast" id="toast"></div>

<script type="module" src="js/connections-editor.js"></script>
</body>
</html>
