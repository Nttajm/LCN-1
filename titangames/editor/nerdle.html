<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nerdle Editor — Titan Times</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700&family=Libre+Franklin:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/editor.css">
<link rel="stylesheet" href="css/nerdle-editor.css">
</head>
<body>

<header class="editor-header">
    <div class="editor-header-left">
        <a href="index.html" class="editor-logo">
            <img class="editor-logo-icon" src="../assets/ttt.png" alt="Titan Games Logo">
            <span class="editor-logo-text">Titan Times</span>
        </a>
        <span class="editor-badge">Editor</span>
        <svg class="editor-breadcrumb-sep" viewBox="0 0 8 14" fill="none" stroke="#999" stroke-width="1.5"><path d="M1 1l6 6-6 6"/></svg>
        <span class="editor-breadcrumb">Nerdle</span>
    </div>
    <div class="editor-header-right">
        <span class="editor-save-indicator" id="saveIndicator"></span>
        <button class="editor-btn editor-btn--secondary editor-btn--sm" id="btnSaveDraft">Save Draft</button>
        <button class="editor-btn editor-btn--accent editor-btn--sm" id="btnPublish">Publish</button>
    </div>
</header>

<main class="nerdle-editor-main">
    <div class="nerdle-editor-topbar">
        <div class="nerdle-editor-meta">
            <div class="nerdle-meta-field">
                <label for="releaseDate">Release Date</label>
                <input type="date" id="releaseDate">
            </div>
            <div class="nerdle-meta-field">
                <label for="authorName">Author</label>
                <input type="text" id="authorName" value="Joel Mulonde" placeholder="Author name">
            </div>
            <div class="nerdle-meta-field">
                <label for="puzzleNumber">Puzzle #</label>
                <input type="number" id="puzzleNumber" min="1" placeholder="Auto">
            </div>
        </div>
        <div class="nerdle-editor-releases">
            <label>Existing Releases</label>
            <div class="nerdle-releases-scroll" id="releasesList"></div>
        </div>
    </div>

    <div class="nerdle-editor-body">
        <div class="nerdle-word-section">
            <h2>Target Word</h2>
            <p class="nerdle-hint">Enter the 5-letter word players will guess</p>
            <div class="nerdle-word-input-container">
                <input type="text" id="targetWord" class="nerdle-word-input" maxlength="5" placeholder="WORD" autocomplete="off" spellcheck="false">
                <button class="editor-btn editor-btn--secondary editor-btn--sm" id="btnValidateWord">Validate</button>
            </div>
            <div class="nerdle-validation-status" id="validationStatus"></div>
        </div>

        <div class="nerdle-preview-section">
            <h2>Preview</h2>
            <div class="nerdle-preview-board" id="previewBoard">
                <div class="nerdle-preview-row" id="previewRow">
                    <div class="nerdle-preview-tile"></div>
                    <div class="nerdle-preview-tile"></div>
                    <div class="nerdle-preview-tile"></div>
                    <div class="nerdle-preview-tile"></div>
                    <div class="nerdle-preview-tile"></div>
                </div>
            </div>
        </div>

        <div class="nerdle-hints-section">
            <h2>Hints (Optional)</h2>
            <p class="nerdle-hint">Add up to 3 hints players can reveal</p>
            <div class="nerdle-hints-list">
                <div class="nerdle-hint-field">
                    <label for="hint1">Hint 1</label>
                    <input type="text" id="hint1" placeholder="First clue...">
                </div>
                <div class="nerdle-hint-field">
                    <label for="hint2">Hint 2</label>
                    <input type="text" id="hint2" placeholder="Second clue...">
                </div>
                <div class="nerdle-hint-field">
                    <label for="hint3">Hint 3</label>
                    <input type="text" id="hint3" placeholder="Third clue...">
                </div>
            </div>
        </div>

        <div class="nerdle-json-section">
            <h2>JSON Export / Import</h2>
            <textarea class="nerdle-json-input" id="fullJson" rows="8" placeholder='{"word": "CRANE", "hints": ["A bird", "Also a machine"]}'></textarea>
            <div class="nerdle-json-actions">
                <button class="editor-btn editor-btn--secondary editor-btn--sm" id="btnExportJson">Export</button>
                <button class="editor-btn editor-btn--primary editor-btn--sm" id="btnImportJson">Import</button>
            </div>
        </div>
    </div>
</main>

<div class="nerdle-toast" id="toast"></div>

<script type="module" src="js/nerdle-editor.js"></script>
</body>
</html>
