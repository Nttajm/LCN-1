<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Titan Times Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700&family=Libre+Franklin:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/editor.css">
</head>
<body>

<header class="editor-header">
    <div class="editor-header-left">
        <a href="../index.html" class="editor-logo">
            <svg class="editor-logo-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="28" height="28" rx="4" fill="#121212"/>
                <text x="6" y="20.5" font-family="'Noto Serif', serif" font-weight="700" font-size="18" fill="white">T</text>
            </svg>
            <span class="editor-logo-text">Titan Times</span>
        </a>
        <span class="editor-badge">Editor</span>
    </div>
</header>

<main class="editor-main">
    <div class="editor-hero">
        <h1 class="editor-title">Content Studio</h1>
        <p class="editor-subtitle">Create and manage puzzle releases</p>
    </div>

    <section class="editor-games">
        <h2 class="editor-section-heading">Games</h2>
        <div class="editor-games-grid">
            <a href="crossword.html" class="editor-game-card">
                <div class="editor-game-icon">
                    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="6" y="6" width="52" height="52" rx="7" fill="white"/>
                        <rect x="6" y="6" width="52" height="52" rx="7" stroke="#ccc" stroke-width="1"/>
                        <rect x="12" y="12" width="9" height="9" fill="#121212"/>
                        <rect x="23" y="12" width="9" height="9" fill="#121212"/>
                        <rect x="34" y="12" width="9" height="9" fill="white"/>
                        <rect x="45" y="12" width="9" height="9" fill="#121212"/>
                        <rect x="12" y="23" width="9" height="9" fill="white"/>
                        <rect x="23" y="23" width="9" height="9" fill="#121212"/>
                        <rect x="34" y="23" width="9" height="9" fill="#121212"/>
                        <rect x="45" y="23" width="9" height="9" fill="white"/>
                        <rect x="12" y="34" width="9" height="9" fill="#121212"/>
                        <rect x="23" y="34" width="9" height="9" fill="white"/>
                        <rect x="34" y="34" width="9" height="9" fill="white"/>
                        <rect x="45" y="34" width="9" height="9" fill="#121212"/>
                        <rect x="12" y="45" width="9" height="9" fill="white"/>
                        <rect x="23" y="45" width="9" height="9" fill="#121212"/>
                        <rect x="34" y="45" width="9" height="9" fill="#121212"/>
                        <rect x="45" y="45" width="9" height="9" fill="white"/>
                    </svg>
                </div>
                <div class="editor-game-info">
                    <h3>The Crossword</h3>
                    <p class="editor-game-status" id="crosswordStatus">Loading...</p>
                </div>
                <svg class="editor-game-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 18l6-6-6-6"/>
                </svg>
            </a>
        </div>
    </section>

    <section class="editor-recent">
        <h2 class="editor-section-heading">Recent Releases</h2>
        <div class="editor-releases-list" id="recentReleases">
            <div class="editor-loading">Loading releases...</div>
        </div>
    </section>
</main>

<script type="module" src="js/editor-dashboard.js"></script>
</body>
</html>
