<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In – Titan Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700&family=Libre+Franklin:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

:root {
    --text-primary: #121212;
    --text-secondary: #5A5A5A;
    --bg: #FFFFFF;
    --border: #E0E0E0;
}

body {
    font-family: 'Libre Franklin', sans-serif;
    background: #f5f5f5;
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

header {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--text-primary);
}

.logo-icon {
    width: 28px;
    height: 28px;
}

.logo-text {
    font-family: 'Noto Serif', serif;
    font-weight: 700;
    font-size: 21px;
    letter-spacing: -0.5px;
}

main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
}

.signin-card {
    background: var(--bg);
    width: min(26rem, 100%);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}

.signin-top {
    background: var(--text-primary);
    padding: 2rem 2rem 1.75rem;
}

.signin-logo {
    display: flex;
    align-items: center;
    gap: 0.625rem;
    margin-bottom: 1.25rem;
}

.signin-logo img {
    width: 2rem;
    height: 2rem;
}

.signin-logo-name {
    font-family: 'Noto Serif', Georgia, serif;
    font-weight: 700;
    font-size: 1rem;
    color: #fff;
    letter-spacing: -0.015em;
}

.signin-heading {
    font-family: 'Noto Serif', Georgia, serif;
    font-weight: 700;
    font-size: 1.875rem;
    color: #fff;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
}

.signin-sub {
    font-family: 'Libre Franklin', sans-serif;
    font-size: 0.8125rem;
    color: rgba(255,255,255,0.55);
    line-height: 1.5;
}

.signin-body {
    padding: 1.5rem 2rem 2rem;
}

.google-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.625rem;
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1.5px solid #d4d4d4;
    background: #fff;
    border-radius: 0.25rem;
    font-family: 'Libre Franklin', sans-serif;
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--text-primary);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    letter-spacing: 0.01em;
}

.google-btn:hover {
    border-color: var(--text-primary);
    background: #fafafa;
}

.google-btn svg {
    width: 1.125rem;
    height: 1.125rem;
    flex-shrink: 0;
}

.divider {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin: 1.25rem 0;
}

.divider::before,
.divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #e8e8e8;
}

.divider span {
    font-family: 'Libre Franklin', sans-serif;
    font-size: 0.6875rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #aaa;
}

.signin-form {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.field {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
}

.field label {
    font-family: 'Libre Franklin', sans-serif;
    font-size: 0.6875rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #6a6a6a;
}

.field input {
    border: none;
    border-bottom: 1.5px solid #d4d4d4;
    background: transparent;
    padding: 0.5rem 0;
    font-family: 'Libre Franklin', sans-serif;
    font-size: 0.9375rem;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.15s;
}

.field input:focus {
    border-bottom-color: var(--text-primary);
}

.field input::placeholder {
    color: #c0c0c0;
}

.submit-btn {
    width: 100%;
    padding: 0.875rem;
    background: var(--text-primary);
    color: #fff;
    border: none;
    border-radius: 0.25rem;
    font-family: 'Libre Franklin', sans-serif;
    font-size: 0.875rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    margin-top: 0.25rem;
    transition: background 0.15s;
}

.submit-btn:hover {
    background: #2a2a2a;
}

.submit-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.toggle {
    text-align: center;
    margin-top: 1rem;
    font-family: 'Libre Franklin', sans-serif;
    font-size: 0.8125rem;
    color: #6a6a6a;
}

.toggle button {
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: inherit;
    font-weight: 700;
    color: var(--text-primary);
    text-decoration: underline;
    padding: 0;
}

.error-msg {
    font-family: 'Libre Franklin', sans-serif;
    font-size: 0.8125rem;
    color: #c0392b;
    background: #fef2f2;
    border-left: 3px solid #c0392b;
    padding: 0.625rem 0.75rem;
    border-radius: 0.25rem;
    margin-bottom: 0.5rem;
    display: none;
}

.error-msg.show {
    display: block;
}

.back-link {
    text-align: center;
    margin-top: 1.25rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
}

.back-link a {
    font-family: 'Libre Franklin', sans-serif;
    font-size: 0.8125rem;
    color: var(--text-secondary);
    text-decoration: none;
}

.back-link a:hover {
    color: var(--text-primary);
    text-decoration: underline;
}
</style>
</head>
<body>
<header>
    <a href="index.html" class="logo">
        <img class="logo-icon" src="assets/ttt.png" alt="Titan Games Logo">
        <span class="logo-text">Games</span>
    </a>
</header>

<main>
    <div class="signin-card">
        <div class="signin-top">
            <div class="signin-logo">
                <img src="assets/ttt.png" alt="Titan Games Logo">
                <span class="signin-logo-name">Titan Games</span>
            </div>
            <h1 class="signin-heading" id="formHeading">Welcome back.</h1>
            <p class="signin-sub">Sign in to save streaks and track your scores.</p>
        </div>
        <div class="signin-body">
            <button class="google-btn" id="googleBtn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continue with Google
            </button>
            <div class="divider"><span>or</span></div>
            <div class="error-msg" id="errorMsg"></div>
            <form class="signin-form" id="signinForm" novalidate>
                <div class="field" id="nameField" style="display:none">
                    <label for="nameInput">Full Name</label>
                    <input type="text" id="nameInput" placeholder="Your name" autocomplete="name"/>
                </div>
                <div class="field">
                    <label for="emailInput">Email</label>
                    <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email" required/>
                </div>
                <div class="field">
                    <label for="passwordInput">Password</label>
                    <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password" required/>
                </div>
                <button class="submit-btn" type="submit" id="submitBtn">Sign In</button>
            </form>
            <div class="toggle" id="toggleSection">
                No account? <button type="button" id="modeSwitch">Create one</button>
            </div>
            <div class="back-link">
                <a href="index.html">← Back to Games</a>
            </div>
        </div>
    </div>
</main>

<script type="module">
import { auth, db, googleProvider } from "./js/firebase.js";
import {
    onAuthStateChanged,
    signInWithPopup,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    updateProfile
} from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
import { doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

let isSignUp = false;

const form = document.getElementById("signinForm");
const emailInput = document.getElementById("emailInput");
const passwordInput = document.getElementById("passwordInput");
const nameInput = document.getElementById("nameInput");
const nameField = document.getElementById("nameField");
const submitBtn = document.getElementById("submitBtn");
const googleBtn = document.getElementById("googleBtn");
const modeSwitch = document.getElementById("modeSwitch");
const toggleSection = document.getElementById("toggleSection");
const formHeading = document.getElementById("formHeading");
const errorMsg = document.getElementById("errorMsg");

async function saveNewUser(user) {
    const ref = doc(db, "titan_users", user.uid);
    const snap = await getDoc(ref);
    if (snap.exists()) return;
    await setDoc(ref, {
        uid: user.uid,
        displayName: user.displayName || null,
        email: user.email,
        photoURL: user.photoURL || null,
        createdAt: serverTimestamp()
    });
}

function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add("show");
}

function hideError() {
    errorMsg.classList.remove("show");
}

function setMode(signUp) {
    isSignUp = signUp;
    hideError();
    if (signUp) {
        formHeading.textContent = "Create your account.";
        submitBtn.textContent = "Create Account";
        nameField.style.display = "";
        toggleSection.innerHTML = 'Have an account? <button type="button" id="modeSwitch">Sign in</button>';
        passwordInput.autocomplete = "new-password";
    } else {
        formHeading.textContent = "Welcome back.";
        submitBtn.textContent = "Sign In";
        nameField.style.display = "none";
        toggleSection.innerHTML = 'No account? <button type="button" id="modeSwitch">Create one</button>';
        passwordInput.autocomplete = "current-password";
    }
    document.getElementById("modeSwitch").addEventListener("click", () => setMode(!isSignUp));
}

modeSwitch.addEventListener("click", () => setMode(true));

// Handle Google sign in
googleBtn.addEventListener("click", async () => {
    hideError();
    try {
        const result = await signInWithPopup(auth, googleProvider);
        await saveNewUser(result.user);
        window.location.href = "index.html";
    } catch (err) {
        if (err.code !== "auth/popup-closed-by-user") {
            showError(err.message);
        }
    }
});

// Handle form submission
form.addEventListener("submit", async (e) => {
    e.preventDefault();
    hideError();

    const email = emailInput.value.trim();
    const password = passwordInput.value;

    if (!email || !password) {
        showError("Please enter both email and password.");
        return;
    }

    submitBtn.disabled = true;

    try {
        if (isSignUp) {
            const name = nameInput.value.trim();
            const cred = await createUserWithEmailAndPassword(auth, email, password);
            if (name) {
                await updateProfile(cred.user, { displayName: name });
            }
            await saveNewUser(cred.user);
        } else {
            await signInWithEmailAndPassword(auth, email, password);
        }
        window.location.href = "index.html";
    } catch (err) {
        let msg = err.message;
        if (err.code === "auth/user-not-found" || err.code === "auth/wrong-password" || err.code === "auth/invalid-credential") {
            msg = "Invalid email or password.";
        } else if (err.code === "auth/email-already-in-use") {
            msg = "An account with this email already exists.";
        } else if (err.code === "auth/weak-password") {
            msg = "Password should be at least 6 characters.";
        }
        showError(msg);
    } finally {
        submitBtn.disabled = false;
    }
});

// Redirect if already logged in
onAuthStateChanged(auth, (user) => {
    if (user) {
        window.location.href = "index.html";
    }
});
</script>
</body>
</html>
