<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Connections — Titan Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Libre+Franklin:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/connections.css">
</head>
<body>

<div class="splash-overlay" id="splashOverlay">
    <div class="splash-content">
        <svg class="splash-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="4" width="24" height="24" rx="4" fill="#F9DF6D"/>
            <rect x="36" y="4" width="24" height="24" rx="4" fill="#A0C35A"/>
            <rect x="4" y="36" width="24" height="24" rx="4" fill="#B0C4EF"/>
            <rect x="36" y="36" width="24" height="24" rx="4" fill="#BA81C5"/>
        </svg>
        <h1 class="splash-title">Connections</h1>
        <p class="splash-tagline">Group words that share a<br>common thread.</p>
        <button class="splash-play-btn" id="playBtn">Play</button>
        <div class="splash-meta">
            <span class="splash-date" id="splashDate"></span>
            <span class="splash-editor">By Joel M.</span>
        </div>
    </div>
</div>

<div class="game-container">
    <header class="game-header">
        <div class="header-left">
            <button class="header-icon-btn nav-trigger" aria-label="Menu">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
                    <line x1="4" y1="6" x2="20" y2="6"/>
                    <line x1="4" y1="12" x2="20" y2="12"/>
                    <line x1="4" y1="18" x2="20" y2="18"/>
                </svg>
            </button>
        </div>
        <h1 class="game-title">Connections</h1>
        <div class="header-right">
            <div class="header-points" id="headerPoints" style="display:none">0 pts</div>
        </div>
    </header>

    <div class="puzzle-info">
        <div class="puzzle-date" id="puzzleDate"></div>
        <div class="puzzle-instruction">Create four groups of four!</div>
    </div>

    <div class="solved-container" id="solvedContainer"></div>

    <div class="game-grid" id="gameGrid"></div>

    <div class="mistakes-container">
        <span class="mistakes-label">Mistakes remaining:</span>
        <div class="mistake-dots">
            <div class="mistake-dot"></div>
            <div class="mistake-dot"></div>
            <div class="mistake-dot"></div>
            <div class="mistake-dot"></div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-outline" id="shuffleBtn">Shuffle</button>
        <button class="btn btn-outline" id="deselectBtn" disabled>Deselect all</button>
        <button class="btn btn-primary" id="submitBtn" disabled>Submit</button>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h2>Perfect!</h2>
        <p>You solved today's puzzle!</p>
        <div class="results-grid"></div>
        <div class="modal-actions"></div>
    </div>
</div>

<script src="../js/nav.js"></script>
<script type="module" src="js/connections.js"></script>
</body>
</html>
