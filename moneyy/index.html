<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONEY CLICKER</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/jophone.css">
</head>
<body>
    <div class="status-panel">
        <img class="status-avatar" src="assets/homelessguy.png" alt="avatar">
        <div class="status-info">
            <span class="status-label">STATUS: <span id="status-text">HOMELESS</span></span>
            <div class="health-row">
                <span class="health-label">HEALTH</span>
                <div class="health-track">
                    <div class="health-fill" id="health-fill"></div>
                </div>
                <span class="health-val" id="health-val">100</span>
            </div>
            <div class="occ-dropdown" id="occ-dropdown">
                <button class="occ-toggle" id="occ-toggle">
                    <span class="occ-toggle-label">OCCUPATIONS</span>
                    <span class="occ-toggle-count" id="occ-count">1/2</span>
                    <span class="occ-arrow" id="occ-arrow">▾</span>
                </button>
                <div class="occ-panel" id="occ-panel"></div>
            </div>
        </div>
    </div>

    <div class="level-bar-wrap" id="level-bar-wrap">
        <div class="level-bar-track">
            <div class="level-bar-fill" id="level-bar-fill"></div>
        </div>
        <span class="level-label" id="level-label">LVL 1 — $0 / $50</span>        <div id="level-bonus-wrap" style="display:none">
            <button id="level-bonus-btn" class="bonus-btn"></button>
        </div>    </div>

    <div class="game">
        <span class="money-display" id="money-display">$0.00</span>
        <button class="click-btn" id="click-btn">WORK</button>
        <span class="stats" id="mps-display">$0.00 / sec</span>
    </div>

    <div class="slots" id="slots"></div>

    <div class="ui-bottom" id="ui-bottom">
        <div class="tab" id="tab-store" style="display:none">
            <div class="tab-header">
                <span class="tab-title">STORE</span>
            </div>
            <div class="tab-body" id="store-body"></div>
            <div class="tab-lock-tip" id="store-lock-tip">you look too broke to even enter a store, get to level 2 first</div>
        </div>
    </div>

    <script src="js/jophone.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
