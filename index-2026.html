<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LCN</title>
  <link rel="stylesheet" href="css/home_2026/home.css">
  <link rel="stylesheet" href="css/standard.css">
  <style>
    body {
      border: 3px solid #ff0000;
      margin: 0;
      padding: 0;
    }
    .maintenance-banner {
      background-color: #ffebee;
      border-bottom: 2px solid #ff0000;
      padding: 15px;
      text-align: center;
      color: #d32f2f;
      font-weight: bold;
      font-size: 16px;
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

          and the broader <strong>community</strong>.
        </p>
        <button class="s2" id="readMoreButton">Read more</button>
        <div class="recents">
          <a href="index/projects.html" class="cge normal">
            <img src="a_home_assets/gradients/g_1.jpg" alt="gradient image">
            <div class="cge-info">
              <h3>Projects</h3>
              <span class="cge-arrow">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M7 17L17 7M17 7H9M17 7v8"/>

          <a href="index/updates.html" class="cge normal">
            <img src="a_home_assets/gradients/g_2_gray.jpg" alt="gradient image">
            <div class="cge-info">
              <h3>Updates</h3>
              <span class="cge-arrow">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">

          <a href="index/develpment.html" class="cge normal">
            <img src="a_home_assets/gradients/g_blue.jpg" alt="gradient image">

              <span class="cge-arrow">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M7 17L17 7M17 7H9M17 7v8"/>
                </svg>
              </span>
            </div>
          </a>

      </div>
